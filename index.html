<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f5f8" />
  <title>Grid</title>
  <style>
    :root {
      /* Default cell size (JS matches this; shrinks only when needed) */
      --cell-size: max(40px, min(11vw, 52px));
      --cell-w: var(--cell-size);
      --cell-h: var(--cell-size);
      --gap: clamp(4px, 1.2vw, 6px);
      --empty: #e8eaef;
      --filled: #3d5a80;
      --border: #b8c0cc;
      --safe-pad: max(12px, env(safe-area-inset-left, 0px));
      --safe-pad-r: max(12px, env(safe-area-inset-right, 0px));
      --safe-pad-t: max(12px, env(safe-area-inset-top, 0px));
      --safe-pad-b: max(12px, env(safe-area-inset-bottom, 0px));
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f5f8;
      padding: var(--safe-pad-t) var(--safe-pad-r) var(--safe-pad-b) var(--safe-pad);
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 12px;
      margin-bottom: clamp(12px, 3vw, 20px);
      width: 100%;
      max-width: 100%;
    }

    .size-field {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #2c3340;
    }

    .size-field input {
      width: 4.25rem;
      min-height: 44px;
      padding: 8px 10px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-align: center;
      touch-action: manipulation;
    }

    .size-field input:focus {
      outline: none;
      border-color: #5c7cfa;
      box-shadow: 0 0 0 2px rgba(92, 124, 250, 0.2);
    }

    button#randomBtn {
      min-height: 44px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #5c7cfa;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(92, 124, 250, 0.35);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: hover) {
      button#randomBtn:hover {
        background: #4c6ef5;
      }
    }

    button#randomBtn:active {
      transform: translateY(1px);
    }

    .linear-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      font-size: 16px;
      font-weight: 500;
      color: #2c3340;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .linear-label input {
      width: 1.35rem;
      height: 1.35rem;
      min-width: 1.35rem;
      min-height: 1.35rem;
      accent-color: #5c7cfa;
      cursor: pointer;
    }

    .grid-wrap {
      width: 100%;
      max-width: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
      touch-action: pan-x pan-y;
    }

    .grid {
      display: grid;
      gap: var(--gap);
      margin: 0 auto;
    }

    .cell {
      width: var(--cell-w);
      height: var(--cell-h);
      min-width: var(--cell-w);
      min-height: var(--cell-h);
      padding: 0;
      background: var(--empty);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s ease, transform 0.08s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0.06);
    }

    @media (hover: hover) {
      .cell:hover {
        filter: brightness(0.97);
      }
    }

    .cell:active {
      transform: scale(0.96);
    }

    .cell.filled {
      background: var(--filled);
      border-color: #2c4466;
    }

    @media (max-width: 380px) {
      .control-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .size-field {
        justify-content: space-between;
      }

      button#randomBtn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="control-bar">
    <label class="size-field">
      Rows
      <input type="number" id="rowsInput" min="1" max="64" value="3" inputmode="numeric" />
    </label>
    <label class="size-field">
      Columns
      <input type="number" id="colsInput" min="1" max="64" value="16" inputmode="numeric" />
    </label>
    <button type="button" id="randomBtn">Random</button>
    <label class="linear-label">
      <input type="checkbox" id="linearToggle" />
      linear
    </label>
  </div>
  <div class="grid-wrap" id="gridWrap">
    <div class="grid" id="grid"></div>
  </div>

  <script>
    (function () {
      const MAX_DIM = 64;
      const gridWrap = document.getElementById("gridWrap");
      const gridEl = document.getElementById("grid");
      const rowsInput = document.getElementById("rowsInput");
      const colsInput = document.getElementById("colsInput");
      const randomBtn = document.getElementById("randomBtn");
      const linearToggle = document.getElementById("linearToggle");

      const cells = [];
      let numRows = 3;
      let numCols = 16;

      function parsePx(value) {
        const n = parseFloat(value);
        return Number.isFinite(n) ? n : 0;
      }

      /** Same as :root --gap: clamp(4px, 1.2vw, 6px) */
      function naturalGapPx() {
        const vw = window.innerWidth / 100;
        return Math.max(4, Math.min(1.2 * vw, 6));
      }

      /** Same as :root --cell-size: max(40px, min(11vw, 52px)) */
      function naturalCellSizePx() {
        const vw = window.innerWidth / 100;
        return Math.max(40, Math.min(11 * vw, 52));
      }

      /** Gap in px from computed style, or CSS-equivalent fallback. */
      function gapPx() {
        const g = getComputedStyle(gridEl).gap;
        if (g && g !== "normal") {
          const parts = g.trim().split(/\s+/);
          const x = parsePx(parts[0]);
          if (x > 0) {
            return x;
          }
        }
        const cg = parsePx(getComputedStyle(gridEl).columnGap);
        if (cg > 0) {
          return cg;
        }
        return naturalGapPx();
      }

      function fitGridToWrap() {
        const natural = naturalCellSizePx();
        const gap = gapPx();
        const cols = Math.max(1, numCols);
        const rows = Math.max(1, numRows);

        const wrap = gridWrap.getBoundingClientRect();
        const bodyPadB = parsePx(getComputedStyle(document.body).paddingBottom) || 0;
        const wrapPadB = parsePx(getComputedStyle(gridWrap).paddingBottom) || 0;
        const vv = window.visualViewport;
        const viewBottom = (vv ? vv.offsetTop : 0) + (vv ? vv.height : window.innerHeight);

        const availW = Math.max(0, gridWrap.clientWidth);
        const availH = Math.max(0, viewBottom - wrap.top - bodyPadB - wrapPadB);

        const totalGapW = gap * Math.max(0, cols - 1);
        const totalGapH = gap * Math.max(0, rows - 1);

        const fitW = (availW - totalGapW) / cols;
        const fitH = (availH - totalGapH) / rows;

        const cellW = Math.min(natural, Math.max(0, fitW));
        const cellH = Math.min(natural, Math.max(0, fitH));

        gridEl.style.setProperty("--cell-w", cellW + "px");
        gridEl.style.setProperty("--cell-h", cellH + "px");
      }

      function cellAt(row, col) {
        return cells[row * numCols + col];
      }

      function readDimensions() {
        let r = parseInt(rowsInput.value, 10);
        let c = parseInt(colsInput.value, 10);
        if (!Number.isFinite(r) || r < 1) {
          r = 1;
        }
        if (!Number.isFinite(c) || c < 1) {
          c = 1;
        }
        r = Math.min(r, MAX_DIM);
        c = Math.min(c, MAX_DIM);
        rowsInput.value = String(r);
        colsInput.value = String(c);
        return { r: r, c: c };
      }

      function enforceLinear() {
        for (let c = 0; c < numCols; c++) {
          const filledRows = [];
          for (let r = 0; r < numRows; r++) {
            if (cellAt(r, c).classList.contains("filled")) {
              filledRows.push(r);
            }
          }
          if (filledRows.length <= 1) {
            continue;
          }
          const keep = Math.max.apply(null, filledRows);
          for (let r = 0; r < numRows; r++) {
            if (r !== keep) {
              cellAt(r, c).classList.remove("filled");
            }
          }
        }
      }

      function buildGrid() {
        const dim = readDimensions();
        numRows = dim.r;
        numCols = dim.c;
        cells.length = 0;
        gridEl.innerHTML = "";
        gridEl.style.gridTemplateColumns = "repeat(" + numCols + ", var(--cell-w))";
        gridEl.style.gridTemplateRows = "repeat(" + numRows + ", var(--cell-h))";
        gridEl.setAttribute(
          "aria-label",
          numRows + " by " + numCols + " grid of squares"
        );

        for (let r = 0; r < numRows; r++) {
          for (let c = 0; c < numCols; c++) {
            const cell = document.createElement("button");
            cell.type = "button";
            cell.className = "cell";
            cell.dataset.row = String(r);
            cell.dataset.col = String(c);
            cell.setAttribute("aria-label", "Cell row " + (r + 1) + ", column " + (c + 1));
            cell.addEventListener("click", function () {
              if (linearToggle.checked) {
                if (cell.classList.contains("filled")) {
                  cell.classList.remove("filled");
                } else {
                  for (let rr = 0; rr < numRows; rr++) {
                    cellAt(rr, c).classList.remove("filled");
                  }
                  cell.classList.add("filled");
                }
              } else {
                cell.classList.toggle("filled");
              }
            });
            gridEl.appendChild(cell);
            cells.push(cell);
          }
        }

        requestAnimationFrame(function () {
          fitGridToWrap();
        });
      }

      rowsInput.addEventListener("change", buildGrid);
      colsInput.addEventListener("change", buildGrid);

      linearToggle.addEventListener("change", function () {
        if (linearToggle.checked) {
          enforceLinear();
        }
      });

      randomBtn.addEventListener("click", function () {
        if (linearToggle.checked) {
          for (let c = 0; c < numCols; c++) {
            for (let r = 0; r < numRows; r++) {
              cellAt(r, c).classList.remove("filled");
            }
            if (Math.random() < 0.5) {
              const r = Math.floor(Math.random() * numRows);
              cellAt(r, c).classList.add("filled");
            }
          }
        } else {
          cells.forEach(function (cell) {
            if (Math.random() < 0.5) {
              cell.classList.add("filled");
            } else {
              cell.classList.remove("filled");
            }
          });
        }
      });

      const ro = new ResizeObserver(function () {
        fitGridToWrap();
      });
      ro.observe(gridWrap);

      window.addEventListener("orientationchange", function () {
        requestAnimationFrame(function () {
          fitGridToWrap();
        });
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", function () {
          requestAnimationFrame(fitGridToWrap);
        });
      }

      buildGrid();
    })();
  </script>
</body>
</html>
